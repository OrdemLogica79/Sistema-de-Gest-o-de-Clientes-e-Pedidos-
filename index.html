<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Clientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- TELA DE LOGIN -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-white rounded-lg card-shadow p-8 w-full max-w-md fade-in">
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-center text-gray-800">Login</h1>
                <p class="text-center text-gray-600 mt-2">Sistema de Gestão de Clientes</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">E-mail</label>
                    <input type="email" id="loginEmail" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="seu@email.com">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Senha</label>
                    <input type="password" id="loginPassword" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:shadow-lg transition duration-200">
                    Entrar
                </button>
            </form>

            <div id="loginError" class="mt-4 p-3 bg-red-100 text-red-700 rounded hidden"></div>
        </div>
    </div>

    <!-- TELA PRINCIPAL (DASHBOARD) -->
    <div id="dashboardPage" class="hidden min-h-screen bg-gray-50">
        <!-- HEADER -->
        <nav class="bg-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <h1 class="text-2xl font-bold text-gray-800">Dashboard</h1>
                <div class="flex gap-4">
                    <button onclick="goToAddClient()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
                        + Novo Cliente
                    </button>
                    <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition">
                        Sair
                    </button>
                </div>
            </div>
        </nav>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="max-w-7xl mx-auto px-4 py-8">
            <div class="bg-white rounded-lg card-shadow p-6 fade-in">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Meus Clientes</h2>

                <div id="loadingSpinner" class="hidden flex justify-center items-center py-8">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600"></div>
                </div>

                <div id="clientsList" class="overflow-x-auto"></div>

                <div id="emptyMessage" class="text-center py-8 text-gray-600">
                    <p>Nenhum cliente cadastrado ainda.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- TELA DE CADASTRO -->
    <div id="addClientPage" class="hidden min-h-screen bg-gray-50">
        <nav class="bg-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4 py-4">
                <button onclick="goToDashboard()" class="text-purple-600 hover:text-purple-800 font-semibold">
                    ← Voltar
                </button>
            </div>
        </nav>

        <div class="max-w-2xl mx-auto px-4 py-8">
            <div class="bg-white rounded-lg card-shadow p-8 fade-in">
                <h1 class="text-2xl font-bold text-gray-800 mb-6">Cadastrar Novo Cliente</h1>

                <form id="addClientForm" class="space-y-4">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Nome do Cliente *</label>
                        <input type="text" id="clientName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="João Silva">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">E-mail *</label>
                        <input type="email" id="clientEmail" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="cliente@email.com">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Telefone *</label>
                        <input type="tel" id="clientPhone" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="(11) 99999-9999">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">IMEI *</label>
                        <input type="text" id="clientIMEI" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="Número IMEI do dispositivo">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Data de Venda *</label>
                        <input type="date" id="clientSaleDate" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Data de Vencimento (opcional)</label>
                        <input type="date" id="clientExpiryDate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <p class="text-sm text-gray-500 mt-1">Se não preenchido, será 30 dias após a data de venda</p>
                    </div>

                    <div class="pt-4 flex gap-4">
                        <button type="submit" class="flex-1 bg-green-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-green-700 transition">
                            Cadastrar
                        </button>
                        <button type="button" onclick="goToDashboard()" class="flex-1 bg-gray-400 text-white font-bold py-2 px-4 rounded-lg hover:bg-gray-500 transition">
                            Cancelar
                        </button>
                    </div>
                </form>

                <div id="addClientError" class="mt-4 p-3 bg-red-100 text-red-700 rounded hidden"></div>
                <div id="addClientSuccess" class="mt-4 p-3 bg-green-100 text-green-700 rounded hidden"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        // ===== GERENCIAMENTO DE NAVEGAÇÃO =====
        function goToDashboard() {
            document.getElementById("loginPage").classList.add("hidden");
            document.getElementById("addClientPage").classList.add("hidden");
            document.getElementById("dashboardPage").classList.remove("hidden");
            loadClients();
        }

        function goToAddClient() {
            document.getElementById("dashboardPage").classList.add("hidden");
            document.getElementById("addClientPage").classList.remove("hidden");
            document.getElementById("addClientForm").reset();
            document.getElementById("addClientError").classList.add("hidden");
            document.getElementById("addClientSuccess").classList.add("hidden");
        }

        function showLogin() {
            document.getElementById("dashboardPage").classList.add("hidden");
            document.getElementById("addClientPage").classList.add("hidden");
            document.getElementById("loginPage").classList.remove("hidden");
        }

        // ===== VERIFICAÇÃO DE AUTENTICAÇÃO =====
        function getToken() {
            // Token em cookie HttpOnly: não acessível por JavaScript.
            return "";
        }

        async function isAuthenticated() {
            try {
                const response = await fetch(`${API_URL}/clientes/meus-clientes`, {
                    method: "GET",
                    credentials: "include"
                });
                return response.ok;
            } catch {
                return false;
            }
        }

        // ===== LOGIN =====
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            try {
                const response = await fetch(`${API_URL}/login/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ email, senha: password })
                });

                if (!response.ok) {
                    throw new Error("Credenciais inválidas");
                }

                document.getElementById("loginError").classList.add("hidden");
                goToDashboard();

            } catch (error) {
                const errorDiv = document.getElementById("loginError");
                errorDiv.textContent = "Erro: " + error.message;
                errorDiv.classList.remove("hidden");
            }
        });

        // ===== LOGOUT =====
        async function logout() {
            try {
                await fetch(`${API_URL}/login/logout`, {
                    method: "POST",
                    credentials: "include"
                });
            } finally {
                showLogin();
                document.getElementById("loginForm").reset();
            }
        }

        // ===== CARREGAR CLIENTES =====
        async function loadClients() {
            document.getElementById("loadingSpinner").classList.remove("hidden");
            document.getElementById("clientsList").innerHTML = "";

            try {
                const response = await fetch(`${API_URL}/clientes/meus-clientes`, {
                    method: "GET",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include"
                });

                if (response.status === 401) {
                    await logout();
                    return;
                }

                if (!response.ok) {
                    throw new Error("Erro ao carregar clientes");
                }

                const clientes = await response.json();
                document.getElementById("loadingSpinner").classList.add("hidden");

                if (clientes.length === 0) {
                    document.getElementById("emptyMessage").classList.remove("hidden");
                    document.getElementById("clientsList").innerHTML = "";
                } else {
                    document.getElementById("emptyMessage").classList.add("hidden");
                    renderClientesTable(clientes);
                }

            } catch (error) {
                document.getElementById("loadingSpinner").classList.add("hidden");
                document.getElementById("clientsList").innerHTML = `<p class="text-red-600">Erro ao carregar: ${error.message}</p>`;
            }
        }

        // ===== RENDERIZAR TABELA DE CLIENTES =====
        function renderClientesTable(clientes) {
            let html = `
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-gray-200 border-b">
                            <th class="px-4 py-2 text-left">Nome</th>
                            <th class="px-4 py-2 text-left">E-mail</th>
                            <th class="px-4 py-2 text-left">Telefone</th>
                            <th class="px-4 py-2 text-left">IMEI</th>
                            <th class="px-4 py-2 text-left">Data de Venda</th>
                            <th class="px-4 py-2 text-left">Vencimento</th>
                            <th class="px-4 py-2 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            clientes.forEach(cliente => {
                html += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="px-4 py-2">${cliente.nome}</td>
                        <td class="px-4 py-2">${cliente.email}</td>
                        <td class="px-4 py-2">${cliente.telefone}</td>
                        <td class="px-4 py-2 text-sm font-mono">${cliente.imei}</td>
                        <td class="px-4 py-2">${formatDate(cliente.data_venda)}</td>
                        <td class="px-4 py-2">${formatDate(cliente.data_vencimento)}</td>
                        <td class="px-4 py-2 text-center">
                            <button onclick="deleteClient(${cliente.id})" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 transition text-sm">
                                Deletar
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            document.getElementById("clientsList").innerHTML = html;
        }

        // ===== FORMATADOR DE DATA =====
        function formatDate(dateString) {
            if (!dateString) return "-";
            const date = new Date(dateString + "T00:00:00");
            return date.toLocaleDateString("pt-BR");
        }

        // ===== DELETAR CLIENTE =====
        async function deleteClient(clientId) {
            if (!confirm("Tem certeza que deseja deletar este cliente?")) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/clientes/deletar/${clientId}`, {
                    method: "DELETE",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include"
                });

                if (response.status === 401) {
                    await logout();
                    return;
                }

                if (!response.ok) {
                    throw new Error("Erro ao deletar cliente");
                }

                loadClients();
                alert("Cliente deletado com sucesso!");

            } catch (error) {
                alert("Erro ao deletar: " + error.message);
            }
        }

        // ===== CADASTRAR NOVO CLIENTE =====
        document.getElementById("addClientForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const clientData = {
                Nome_do_Cliente: document.getElementById("clientName").value,
                Email: document.getElementById("clientEmail").value,
                Telefone: document.getElementById("clientPhone").value,
                IMEI: document.getElementById("clientIMEI").value,
                Data_venda: document.getElementById("clientSaleDate").value,
                Data_vencimento: document.getElementById("clientExpiryDate").value || null
            };

            try {
                const response = await fetch(`${API_URL}/clientes/cadastro`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify(clientData)
                });

                if (response.status === 401) {
                    await logout();
                    return;
                }

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || "Erro ao cadastrar");
                }

                const data = await response.json();
                document.getElementById("addClientError").classList.add("hidden");

                const successDiv = document.getElementById("addClientSuccess");
                successDiv.textContent = "Cliente cadastrado com sucesso!";
                successDiv.classList.remove("hidden");

                setTimeout(() => {
                    goToDashboard();
                }, 1500);

            } catch (error) {
                const errorDiv = document.getElementById("addClientError");
                errorDiv.textContent = "Erro: " + error.message;
                errorDiv.classList.remove("hidden");
            }
        });

        // ===== INICIALIZAÇÃO =====
        window.addEventListener("load", async () => {
            if (await isAuthenticated()) {
                goToDashboard();
            } else {
                showLogin();
            }
        });
    </script>

</body>
</html>
